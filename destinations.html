    <main style="padding-top: 40px;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 20px;">
            <h1 style="text-align: center; margin-bottom: 30px;">Famous Destinations</h1>
           
            <!-- Search Box -->
            <div style="text-align: center; margin-bottom: 40px;">
                <input type="text" id="searchInput"
                       placeholder="Search destinations (e.g. Paris, Taj, Machu, Tokyo, Sydney)"
                       style="width: 80%; max-width: 500px; padding: 12px 20px; font-size: 1.1rem; border: 2px solid #ddd; border-radius: 50px;">
            </div>
            
            <!-- Destinations Grid -->
            <div id="destinationsGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px;">
                <!-- Cards added by JavaScript -->
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 VoyageVista - Group Project</p>
    </footer>

            }
        ];

        function displayDestinations(filteredDestinations) {
            const grid = document.getElementById('destinationsGrid');
            grid.innerHTML = '';
            filteredDestinations.forEach(dest => {
                const cardHTML = `
                    <div class="card" style="border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                        <img src="${dest.image}" alt="${dest.name}"
                             style="width: 100%; height: 200px; object-fit: cover;">
                        <div style="padding: 20px;">
                            <h3>${dest.name}</h3>
                            <p style="margin: 10px 0;">${dest.description}</p>
                            <a href="planner.html" style="color: #0066cc; text-decoration: none;">Plan a Trip Here →</a>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filtered = destinations.filter(dest =>
                dest.name.toLowerCase().includes(searchTerm) ||
                dest.description.toLowerCase().includes(searchTerm)
            );
            displayDestinations(filtered);
        });

        // Load all destinations on page load
        window.onload = function() {
            displayDestinations(destinations);
        };
    </script>
</body>
</html>
