<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - VoyageVista</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">VoyageVista</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li><a href="planner.html">Trip Planner</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <button class="toggle-theme" aria-label="Toggle dark mode">🌙</button>
        </nav>
    </header>

    <main style="max-width: 700px; margin: 40px auto; padding: 20px;">
        <h1 style="text-align: center; margin-bottom: 40px;">Get In Touch</h1>
        
        <form id="contactForm">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Your Name *</label>
            <input type="text" id="cName" required style="width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 8px;">

            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Email Address *</label>
            <input type="email" id="cEmail" required style="width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 8px;">

            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Message *</label>
            <textarea id="cMessage" rows="6" required 
                      style="width: 100%; padding: 12px; margin-bottom: 25px; border: 2px solid #ddd; border-radius: 8px;"></textarea>

            <div style="text-align: center;">
                <button type="submit" 
                        style="background: #0066cc; color: white; padding: 15px 50px; border: none; border-radius: 50px; font-size: 1.1rem; cursor: pointer;">
                    Send Message
                </button>
            </div>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 VoyageVista - Group Project</p>
    </footer>

    <script src="js/script.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('cName').value.trim();
            
            if (name) {
                alert(`Thank you, ${name}! Your message has been received. We will reply soon.`);
                this.reset();
            }
        });
    </script>
</body>
</html>
